name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"(.*)"/\1/')
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create release if it doesn't already exist
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --title "$TAG" --target "${{ github.sha }}" --generate-notes
            # Linux/macOS binaries are uploaded as raw files, not archives, so
            # the executable bit doesn't survive the download (GitHub serves
            # assets over plain HTTP, which carries no permission metadata) -
            # prepend a heads-up to the auto-generated notes.
            NOTE='**Note:** the Linux/macOS binaries are uploaded as raw files (not archived), so the executable bit does not survive the download. Run `chmod +x` on the binary before using it.'
            BODY=$(gh release view "$TAG" --json body -q .body)
            gh release edit "$TAG" --notes "$NOTE"$'\n\n'"$BODY"
          fi

  build-and-test:
    name: Build & test (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Determine target triple
        id: target
        shell: bash
        run: |
          echo "triple=$(rustc -vV | sed -n 's/^host: //p')" >> "$GITHUB_OUTPUT"
      - name: Build and test (release profile)
        run: cargo test --release --verbose
      - name: Package binary
        shell: bash
        run: |
          BIN_NAME=texsift
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          cp "target/release/${BIN_NAME}${EXT}" "${BIN_NAME}-${{ steps.target.outputs.triple }}${EXT}"
      - name: Upload binary to release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN_NAME=texsift
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          gh release upload "${{ needs.release.outputs.tag }}" "${BIN_NAME}-${{ steps.target.outputs.triple }}${EXT}" --clobber
