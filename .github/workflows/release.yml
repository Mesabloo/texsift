name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create release if it doesn't already exist
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --title "$TAG" --target "${{ github.sha }}" --generate-notes
          fi

  build-and-test:
    name: Build & test (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Determine target triple
        id: target
        shell: bash
        run: |
          echo "triple=$(rustc -vV | sed -n 's/^host: //p')" >> "$GITHUB_OUTPUT"
      - name: Build and test (release profile)
        run: cargo test --release --verbose
      - name: Stage archive contents
        id: stage
        shell: bash
        run: |
          BIN_NAME=texsift
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          STAGE="texsift-${{ needs.release.outputs.version }}-${{ steps.target.outputs.triple }}"
          mkdir -p "$STAGE"
          cp "target/release/${BIN_NAME}${EXT}" "$STAGE/"
          printf '%s\n' \
            "texsift ${{ needs.release.outputs.version }} (${{ steps.target.outputs.triple }})" \
            "" \
            "Installation:" \
            "  1. Move \`texsift\` (or \`texsift.exe\` on Windows) to a directory on" \
            "     your PATH, e.g. \`~/.local/bin\` or \`/usr/local/bin\`." \
            "  2. Run \`texsift --help\` to confirm it works." \
            "" \
            "https://github.com/Mesabloo/texsift" \
            > "$STAGE/INSTALL.txt"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
      - name: Archive (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "${{ steps.stage.outputs.stage }}.tar.gz" "${{ steps.stage.outputs.stage }}"
      - name: Archive (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ steps.stage.outputs.stage }}" -DestinationPath "${{ steps.stage.outputs.stage }}.zip" -Force
      - name: Upload archive to release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXT="tar.gz"
          if [ "${{ runner.os }}" = "Windows" ]; then EXT="zip"; fi
          gh release upload "${{ needs.release.outputs.tag }}" "${{ steps.stage.outputs.stage }}.${EXT}" --clobber
